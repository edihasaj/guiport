name: Feature request
description: Suggest a new capability or change
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: "Describe the use case. Tie it to the agent/QA infra wedge."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This stays inside the agent/QA wedge (not a generic Manus clone).
        - label: I've checked open issues for duplicates.
