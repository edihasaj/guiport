name: Release

# Auto-bumps Version.swift patch on every push to main that *isn't* itself a
# release commit. Tags + pushes back so each merge produces a real
# `v0.x.y` we can attach artifacts to without manual bookkeeping.
on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    # Skip our own bump commits (pushed by github-actions[bot] via this
    # same workflow — would otherwise loop forever).
    if: "github.actor != 'github-actions[bot]'"
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      next: ${{ steps.bump.outputs.next }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT/GITHUB_TOKEN won't trigger downstream workflows by default;
          # we use the default token here because the bump commit is tagged
          # `chore(release):` and skipped by this same job's guard.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version in Version.swift
        id: bump
        run: |
          set -euo pipefail
          file=Sources/GuiportCore/Version.swift
          current=$(grep -oE '"[0-9]+\.[0-9]+\.[0-9]+"' "$file" | tr -d '"')
          IFS='.' read -r major minor patch <<<"$current"
          next="$major.$minor.$((patch + 1))"
          echo "Bumping $current → $next"
          sed -i.bak "s/\"$current\"/\"$next\"/" "$file"
          rm "$file.bak"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Commit + tag
        env:
          NEXT: ${{ steps.bump.outputs.next }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add Sources/GuiportCore/Version.swift
          git commit -m "chore(release): v${NEXT}"
          git tag "v${NEXT}"
          git push origin HEAD:main
          git push origin "v${NEXT}"

  # Build the universal macOS binary for the freshly-tagged version, attach it
  # to the GitHub release, and bump the Homebrew tap so `brew upgrade guiport`
  # tracks it. Runs in the SAME workflow run as `bump` (needs:) because a tag
  # pushed by GITHUB_TOKEN does not trigger a fresh `on: push: tags` run.
  release:
    needs: bump
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump.outputs.next }}"
          fetch-depth: 0

      - name: Show toolchain
        run: |
          sw_vers
          swift --version

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: spm-release-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: spm-release-${{ runner.os }}-

      - name: Build universal release binary
        run: swift build -c release --arch arm64 --arch x86_64

      # Developer-ID sign so macOS treats guiport as its OWN, stable TCC subject.
      # A `swift build` binary is only ad-hoc signed (identifier "guiport", cdhash
      # changes every build), so macOS attributes its Screen Recording request to
      # the host terminal and the grant is lost on every `brew upgrade`. A stable
      # Developer-ID identity (com.edihasaj.guiport + team) gives guiport a single
      # persistent entry. Gated on secrets: skips gracefully (ad-hoc) if unset.
      - name: Import Developer ID certificate
        id: cert
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${CERT_P12_BASE64:-}" ]; then
            echo "::warning::MACOS_CERT_P12_BASE64 not set — shipping an ad-hoc-signed"
            echo "::warning::binary. guiport will NOT get a stable Screen Recording"
            echo "::warning::(TCC) identity; grants reset on every upgrade. Add the"
            echo "::warning::secret (base64 of a Developer ID Application .p12) plus"
            echo "::warning::MACOS_CERT_PASSWORD to enable signing."
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          keychain="$RUNNER_TEMP/guiport-signing.keychain-db"
          kpw="$(uuidgen)"
          security create-keychain -p "$kpw" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$kpw" "$keychain"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$keychain" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$kpw" \
            "$keychain" >/dev/null
          # Prepend our keychain to the search list so codesign resolves the identity.
          security list-keychains -d user -s "$keychain" \
            $(security list-keychains -d user | sed -e 's/[[:space:]]*"//' -e 's/"//')
          id=$(security find-identity -v -p codesigning "$keychain" \
            | grep -oE '"Developer ID Application: [^"]+"' | head -1 | tr -d '"')
          [ -n "$id" ] || { echo "no Developer ID Application identity in p12" >&2; exit 1; }
          echo "::add-mask::$id"
          echo "identity=$id" >> "$GITHUB_OUTPUT"
          echo "signed=true" >> "$GITHUB_OUTPUT"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Codesign binary (Developer ID, hardened runtime)
        if: steps.cert.outputs.signed == 'true'
        env:
          IDENTITY: ${{ steps.cert.outputs.identity }}
        run: |
          set -euo pipefail
          bindir=$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)
          codesign --force --options runtime --timestamp \
            --sign "$IDENTITY" \
            --identifier com.edihasaj.guiport \
            "$bindir/guiport"
          codesign --verify --strict --verbose=2 "$bindir/guiport"
          codesign -dv --verbose=4 "$bindir/guiport" 2>&1 | grep -E 'Identifier|TeamIdentifier'

      - name: Package tarball
        id: pkg
        env:
          NEXT: ${{ needs.bump.outputs.next }}
        run: |
          set -euo pipefail
          # Universal builds land under .build/apple/Products/Release, NOT the
          # single-arch .build/release symlink — resolve it from SwiftPM.
          bindir=$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)
          name="guiport-${NEXT}-macos-universal.tar.gz"
          tar -C "$bindir" -czf "$name" guiport
          sha=$(shasum -a 256 "$name" | awk '{print $1}')
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          # Sanity: the built binary must report the version we just tagged.
          got=$("$bindir/guiport" --version | tr -d '[:space:]')
          [ "$got" = "$NEXT" ] || { echo "version mismatch: binary=$got tag=$NEXT"; exit 1; }

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ needs.bump.outputs.next }}
        run: |
          set -euo pipefail
          gh release create "v${NEXT}" "${{ steps.pkg.outputs.name }}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "v${NEXT}" \
            --generate-notes

      - name: Bump Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          NEXT: ${{ needs.bump.outputs.next }}
          SHA: ${{ steps.pkg.outputs.sha }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set — skipping tap bump. The"
            echo "::warning::release artifact is published; add the secret (a PAT"
            echo "::warning::with contents:write on edihasaj/homebrew-guiport) to"
            echo "::warning::auto-bump the formula on future releases."
            exit 0
          fi
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${NEXT}/guiport-${NEXT}-macos-universal.tar.gz"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/edihasaj/homebrew-guiport.git" tap
          f=tap/Formula/guiport.rb
          /usr/bin/sed -i '' -E \
            -e "s#^  url \".*\"#  url \"${url}\"#" \
            -e "s#^  sha256 \".*\"#  sha256 \"${SHA}\"#" \
            -e "s#^  version \".*\"#  version \"${NEXT}\"#" \
            -e "s#assert_match \"[^\"]*\", shell_output#assert_match \"${NEXT}\", shell_output#" \
            "$f"
          cd tap
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add Formula/guiport.rb
          git commit -m "guiport ${NEXT}"
          git push origin HEAD:main
