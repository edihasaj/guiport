name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-macos:
    name: build + test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          swift --version

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Build
        run: swift build -c release

      - name: Test (unit only — AX/input require a logged-in session)
        run: swift test --parallel

      - name: Verify CLI loads
        run: .build/release/guiport --help

  build-windows:
    name: build (Windows)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-5.10-release
          tag: 5.10-RELEASE

      - name: Show toolchain
        shell: pwsh
        run: |
          swift --version

      - name: Setup Visual Studio environment
        uses: compnerd/gha-setup-vsdevenv@main
        with:
          winsdk: "10.0.22621.0"

      - name: Build
        shell: pwsh
        run: swift build -c release

      - name: Verify CLI loads
        shell: pwsh
        run: .build\release\guiport.exe --help

  build-linux:
    name: build (Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "5.10"

      - name: Show toolchain
        run: swift --version

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            .build
          key: spm-linux-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: spm-linux-

      - name: Build
        run: swift build -c release

      - name: Verify CLI loads
        run: .build/release/guiport --help

  lint:
    name: lint (whitespace + filenames)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Trailing whitespace + tabs
        run: |
          ! grep -RIn --include='*.swift' --include='*.md' --include='*.yml' --include='*.yaml' \
            -P '[ \t]+$' Sources Tests examples .github README.md CHANGELOG.md CONTRIBUTING.md
