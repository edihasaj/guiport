name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-macos:
    name: build + test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          swift --version

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Build
        run: swift build -c release

      - name: Test (unit only — AX/input require a logged-in session)
        run: swift test --parallel

      - name: Verify CLI loads
        run: .build/release/guiport --help

  build-windows:
    name: build + test (Windows)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.2.0"

      - name: Show toolchain
        shell: pwsh
        run: |
          swift --version

      - name: Setup Visual Studio environment
        uses: compnerd/gha-setup-vsdevenv@main
        with:
          winsdk: "10.0.26100.0"

      - name: Build
        shell: pwsh
        run: swift build -c release

      # The CLI integration tests (GuiportCLITests) assert macOS lifecycle
      # semantics, so we run only the platform-agnostic unit tests here. The
      # filter still compiles every target — including all adapters — so a
      # Windows build break in the CLI test target would still fail CI.
      - name: Test (platform-agnostic unit tests)
        shell: pwsh
        run: swift test --filter GuiportCoreTests

      - name: Verify CLI loads
        shell: pwsh
        run: .build\release\guiport.exe --help

  build-linux:
    name: build + test (Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "5.10"

      - name: Show toolchain
        run: swift --version

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            .build
          key: spm-linux-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: spm-linux-

      - name: Build
        run: swift build -c release

      # CLI integration tests assert macOS lifecycle semantics; run only the
      # platform-agnostic unit tests here. The filter still compiles every
      # target (all adapters + the CLI test target), so a Linux build break
      # would still fail CI.
      - name: Test (platform-agnostic unit tests)
        run: swift test --filter GuiportCoreTests

      - name: Verify CLI loads
        run: .build/release/guiport --help

  lint:
    name: lint (whitespace + filenames)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Trailing whitespace + tabs
        run: |
          ! grep -RIn --include='*.swift' --include='*.md' --include='*.yml' --include='*.yaml' \
            -P '[ \t]+$' Sources Tests examples .github README.md CHANGELOG.md CONTRIBUTING.md
